# =============================================================================
# Baseline Manifest — Module 0
# =============================================================================
# Single source of truth for all pretrained backbone constants.
# Verified by scripts/inspect_backbone.py on the actual trained model.
# Only models/backbone/ reads this file. All other modules query the wrapper.
# =============================================================================

baseline:
  name: "nnUNet_ZonalSeg"
  framework: "nnUNet_v2"
  dataset_id: "501"
  dataset_name: "Dataset501_ZonalSeg"
  trainer: "nnUNetTrainer"
  plans: "nnUNetPlans"
  configuration: "3d_fullres"
  fold: 0

# --- Checkpoint Paths (relative to nnUNet_results root) ---
checkpoint:
  results_dir: "Dataset501_ZonalSeg/nnUNetTrainer__nnUNetPlans__3d_fullres/fold_0"
  model_file: "checkpoint_final.pth"        # or checkpoint_best.pth
  plans_file: "nnUNetPlans.json"            # in nnUNet_preprocessed
  dataset_json: "dataset.json"              # in nnUNet_preprocessed
  # nnU-Net v2 stores weights under 'network_weights' key in the checkpoint

# --- Architecture (verified values from forward pass trace) ---
architecture:
  network_class: "dynamic_network_architectures.architectures.unet.PlainConvUNet"
  n_stages: 7
  features_per_stage: [32, 64, 128, 256, 320, 320, 320]
  n_conv_per_stage_encoder: [2, 2, 2, 2, 2, 2, 2]
  n_conv_per_stage_decoder: [2, 2, 2, 2, 2, 2]
  kernel_sizes: [[1,3,3], [1,3,3], [3,3,3], [3,3,3], [3,3,3], [3,3,3], [3,3,3]]
  strides:      [[1,1,1], [1,2,2], [1,2,2], [2,2,2], [2,2,2], [1,2,2], [1,2,2]]

  # Bottleneck (Stage 6 output = deepest encoder stage)
  # Computed from patch_size [16,320,320] and cumulative strides:
  #   16 / (1*1*1*2*2*1*1) = 4
  #  320 / (1*2*2*2*2*2*2) = 5
  #  320 / (1*2*2*2*2*2*2) = 5
  bottleneck_channels: 320
  bottleneck_spatial: [4, 5, 5]
  bottleneck_shape: [320, 4, 5, 5]          # [C, D, H, W] per sample

  # Skip connections: stages 0-5 feed into decoder (stage 6 is bottleneck)
  skip_channels: [32, 64, 128, 256, 320, 320]
  skip_count: 6

  conv_op: "torch.nn.Conv3d"
  norm_op: "torch.nn.InstanceNorm3d"
  nonlin: "torch.nn.LeakyReLU"

# --- Input/Output ---
modalities:
  count: 3
  names: ["T2W", "ADC", "HBV"]
  # Channel order matches nnU-Net convention: _0000.nii.gz = T2W, _0001 = ADC, _0002 = HBV

labels:
  count: 3
  mapping:
    background: 0
    PZ: 1          # Peripheral Zone
    TZ: 2          # Transition Zone (+ Central Zone)

# --- Runtime ---
runtime:
  patch_size: [16, 320, 320]
  spacing: [3.0, 0.5, 0.5]
  batch_size: 2                             # from nnUNet plans
  preprocessing: "nnUNet"                   # use nnUNet's own preprocessing

# --- Adaptation Framework Constants ---
# These are derived from the architecture above and used by Modules 2-8
adaptation:
  adapter_input_channels: 320               # = bottleneck_channels
  adapter_reduction_ratio: 4                # 320 → 80 hidden channels
  adapter_hidden_channels: 80               # 320 / 4
  adapter_spatial_size: [4, 5, 5]           # = bottleneck_spatial
  num_adapters: 3                           # one per modality (T2W, ADC, HBV)
  # Note: since our encoder processes all 3 modalities jointly through a shared
  # 3-channel input, the 3 adapters operate on the SAME shared bottleneck.
  # Each adapter learns modality-specific corrections implicitly.
